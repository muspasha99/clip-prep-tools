name: Clip Ping-Pong Hazırlayıcı

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Video URL'i (Pixabay/Pexels sayfası veya direkt .mp4)"
        required: true
      output_name:
        description: "Çıkış dosya adı (uzantısız, boşsa otomatik isim verir)"
        required: false
        default: ""

jobs:
  pingpong:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Sistem hazırlığı
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg wget
          pip install -q --upgrade "yt-dlp[default,curl-cffi]"

      - name: Klipi indir
        env:
          VIDEO_URL: ${{ github.event.inputs.video_url }}
        run: |
          mkdir -p output
          echo "🔗 URL: $VIDEO_URL"
          SUCCESS=0

          # Yöntem 1: yt-dlp + Chrome 120 impersonation
          echo ""
          echo "🔄 Deneme 1: yt-dlp (Chrome 120)"
          if yt-dlp --impersonate chrome-120 \
              -f "bv*[ext=mp4]/b[ext=mp4]/b" \
              --no-playlist \
              -o "input.%(ext)s" \
              "$VIDEO_URL"; then
            SUCCESS=1
            echo "✅ Başarılı (Chrome 120)"
          fi

          # Yöntem 2: yt-dlp + Safari impersonation
          if [ $SUCCESS -eq 0 ]; then
            echo ""
            echo "🔄 Deneme 2: yt-dlp (Safari)"
            if yt-dlp --impersonate safari \
                -f "bv*[ext=mp4]/b[ext=mp4]/b" \
                --no-playlist \
                -o "input.%(ext)s" \
                "$VIDEO_URL"; then
              SUCCESS=1
              echo "✅ Başarılı (Safari)"
            fi
          fi

          # Yöntem 3: yt-dlp default (direkt CDN linkleri için)
          if [ $SUCCESS -eq 0 ]; then
            echo ""
            echo "🔄 Deneme 3: yt-dlp (impersonation yok)"
            if yt-dlp \
                -f "bv*[ext=mp4]/b[ext=mp4]/b" \
                --no-playlist \
                -o "input.%(ext)s" \
                "$VIDEO_URL"; then
              SUCCESS=1
              echo "✅ Başarılı (default)"
            fi
          fi

          # Yöntem 4: wget direkt download
          if [ $SUCCESS -eq 0 ]; then
            echo ""
            echo "🔄 Deneme 4: wget direkt"
            if wget -q -O input.mp4 "$VIDEO_URL" && [ -s input.mp4 ]; then
              if ffprobe -v error input.mp4 >/dev/null 2>&1; then
                SUCCESS=1
                echo "✅ Başarılı (wget)"
              else
                rm -f input.mp4
                echo "⚠ wget indirdi ama geçerli video değil"
              fi
            fi
          fi

          # Hepsi başarısız
          if [ $SUCCESS -eq 0 ]; then
            echo ""
            echo "::error::❌ Hiçbir yöntem işe yaramadı"
            echo "::error::💡 ÇÖZÜM: Pixabay/Pexels'te 'Free Download' butonuna sağ tıkla → 'Bağlantı adresini kopyala' → cdn.pixabay.com/... veya videos.pexels.com/... ile başlayan direkt link kullan"
            exit 1
          fi

          INPUT_FILE=$(ls input.* 2>/dev/null | head -1)
          if [ -z "$INPUT_FILE" ]; then
            echo "::error::Dosya bulunamadı"
            exit 1
          fi
          echo "INPUT_FILE=$INPUT_FILE" >> $GITHUB_ENV

          echo ""
          echo "📥 İndirilen: $INPUT_FILE"
          ffprobe -v error -select_streams v:0 \
            -show_entries stream=width,height,r_frame_rate \
            -show_entries format=duration,size \
            -of default=noprint_wrappers=1 "$INPUT_FILE"

      - name: Ping-pong oluştur
        run: |
          NAME="${{ github.event.inputs.output_name }}"
          if [ -z "$NAME" ]; then
            NAME="pingpong_$(date +%Y%m%d_%H%M%S)"
          fi
          OUTPUT="output/${NAME}.mp4"

          echo "🎬 Ping-pong oluşturuluyor: $OUTPUT"

          ffmpeg -y -i "$INPUT_FILE" \
            -filter_complex "[0:v]split[a][b];[b]reverse[r];[a][r]concat=n=2:v=1[out]" \
            -map "[out]" \
            -c:v libx264 -preset fast -crf 18 \
            -pix_fmt yuv420p \
            -an \
            "$OUTPUT"

          echo "✅ Tamam"
          ls -lh "$OUTPUT"
          DURATION=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$OUTPUT")
          printf "Çıkış süresi: %.1f saniye\n" "$DURATION"

      - name: Artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: pingpong-clip
          path: output/
          retention-days: 7
